<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log in to TC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/social-modern.css">
    <script src="/js/social-modern.js"></script>
</head>
<body>
    <main class="auth-page">
        <section class="auth-card ui-stack" aria-labelledby="loginTitle">
            <div class="text-center mb-4">
                <div class="brand-mark mx-auto mb-3"><i class="fa-solid fa-globe"></i></div>
                <h1 id="loginTitle" class="h3 fw-bold mb-1">Welcome back</h1>
                <p class="text-muted mb-0">Sign in to continue to TC Social.aaaaaa</p>
            </div>

            <div th:if="${param.success}" class="ui-alert ui-alert-success">Registration successful. Please log in.</div>
            <div th:if="${error}" class="ui-alert ui-alert-danger" th:text="${error}"></div>
            <div th:if="${param.error != null and param.error[0] == 'honeypot'}" class="ui-alert ui-alert-danger fw-bold">
                <i class="fa-solid fa-triangle-exclamation me-2"></i> You are not allowed to perform this admin action. The account was removed for a security violation.
            </div>

            <form action="/login" method="POST" class="ui-stack">
                <div class="ui-field">
                    <label class="ui-label" for="username">Username</label>
                    <input id="username" type="text" name="username" class="form-control modern-input" placeholder="Enter your username" autocomplete="username" required>
                </div>
                <div class="ui-field">
                    <label class="ui-label" for="password">Password</label>
                    <input id="password" type="password" name="password" class="form-control modern-input" placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="ui-button ui-button-primary w-100 fs-5">Log in</button>
            </form>

            <div class="mt-4 text-center border-top pt-3">
                <a href="/register" class="text-decoration-none fw-bold text-primary">Create a new account <i class="fa-solid fa-arrow-right ms-1"></i></a>
            </div>
        </section>
    </main>
</body>
</html>
