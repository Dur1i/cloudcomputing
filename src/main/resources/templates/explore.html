<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Explore / TC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary)',
                        secondary: 'var(--accent)',
                        cta: '#2563EB',
                        glass: 'rgba(255, 255, 255, 0.72)',
                        glassDark: 'rgba(15, 23, 42, 0.72)',
                    },
                    fontFamily: {
                        sans: ['Jost', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/social-modern.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/js/social-modern.js"></script>
</head>
<body>
    <a href="#mainContent" class="skip-link">Skip to content</a>
    <div class="toast-stack" id="toastStack"></div>
    <div class="app-shell mt-4">
        <div th:replace="~{components/sidebar :: sidebar}"></div>

        <main id="mainContent" class="main-column flex flex-col gap-6 pb-20" tabindex="-1">
            <header class="bg-white/60 dark:bg-slate-900/60 backdrop-blur-md sticky top-4 z-10 px-6 py-4 rounded-2xl border border-slate-200/50 dark:border-slate-800/50 shadow-sm flex justify-between items-center gap-4">
                <form action="/explore" method="GET" class="w-full relative group">
                    <label for="exploreSearch" class="visually-hidden">Search people or posts</label>
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <input id="exploreSearch" type="search" name="q" class="w-full bg-slate-100 dark:bg-slate-800/80 border-transparent text-slate-900 dark:text-white rounded-full pl-11 pr-4 py-2.5 focus:ring-2 focus:ring-primary/50 focus:border-transparent transition-all placeholder-slate-400" placeholder="Search people or posts" th:value="${keyword}" autocomplete="off">
                </form>
                <button type="button" class="w-10 h-10 flex-shrink-0 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors flex items-center justify-center" onclick="toggleTheme()" title="Toggle theme">
                    <i class="fa-solid fa-circle-half-stroke"></i>
                </button>
            </header>

            <section class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-slate-200/50 dark:border-slate-800/50 rounded-2xl shadow-sm p-6" th:if="${keyword == null}">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-primary to-secondary text-white flex items-center justify-center shadow-lg shadow-primary/30 flex-shrink-0">
                        <i class="fa-solid fa-compass text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-slate-900 dark:text-white mb-1">Discover TC</h1>
                        <p class="text-slate-500 dark:text-slate-400 text-sm">Find people, conversations, and media across your social graph.</p>
                    </div>
                </div>
            </section>

            <section th:if="${users != null && !users.isEmpty()}" class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-slate-200/50 dark:border-slate-800/50 rounded-2xl shadow-sm overflow-hidden" aria-labelledby="peopleResultsTitle">
                <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800/60">
                    <h2 id="peopleResultsTitle" class="text-lg font-bold text-slate-900 dark:text-white">People</h2>
                    <p class="text-sm text-slate-500">Profiles matching your search</p>
                </div>
                <div class="flex flex-col">
                    <a th:each="u : ${users}" th:href="'/profile/' + ${u.username}" class="flex items-center gap-3 px-6 py-3 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                        <img th:src="${u.avatarUrl != null ? u.avatarUrl : 'https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png'}" class="w-12 h-12 rounded-full object-cover flex-shrink-0" alt="avatar">
                        <div class="min-w-0">
                            <div class="font-bold text-slate-900 dark:text-white truncate" th:text="${u.fullName}">Name</div>
                            <div class="text-slate-500 text-sm truncate" th:text="'@' + ${u.username}">@user</div>
                        </div>
                    </a>
                </div>
            </section>

            <section th:if="${posts != null && !posts.isEmpty()}" class="flex flex-col gap-6">
                <div class="px-2">
                    <h2 class="text-lg font-bold text-slate-900 dark:text-white">Posts</h2>
                    <p class="text-sm text-slate-500">Recent matching conversations</p>
                </div>
                
                <article th:each="post : ${posts}" class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-slate-200/50 dark:border-slate-800/50 rounded-2xl shadow-sm p-4 sm:p-5 transition-colors">
                    <div class="flex gap-3">
                        <img th:src="${post.user.avatarUrl != null ? post.user.avatarUrl : 'https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png'}" class="w-11 h-11 rounded-full object-cover flex-shrink-0 cursor-pointer hover:opacity-90 transition-opacity" alt="avatar">
                        <div class="w-full min-w-0">
                            <div class="flex flex-col">
                                <a th:href="'/profile/' + ${post.user.username}" class="font-bold text-[15px] text-slate-900 dark:text-white hover:underline truncate" th:text="${post.user.fullName}">Name</a>
                                <span class="text-slate-500 dark:text-slate-400 text-[13px] truncate" th:text="'@' + ${post.user.username}">@username</span>
                            </div>
                            <div class="mt-2 text-slate-800 dark:text-slate-200 text-[15px] leading-relaxed whitespace-pre-wrap break-words" th:utext="${post.content}">Content</div>
                            
                            <div th:if="${post.mediaUrl != null}" class="mt-3 rounded-2xl overflow-hidden border border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-950">
                                <img th:if="${#strings.endsWith(#strings.toLowerCase(post.mediaUrl), '.jpg') or #strings.endsWith(#strings.toLowerCase(post.mediaUrl), '.jpeg') or #strings.endsWith(#strings.toLowerCase(post.mediaUrl), '.png') or #strings.endsWith(#strings.toLowerCase(post.mediaUrl), '.gif') or #strings.endsWith(#strings.toLowerCase(post.mediaUrl), '.webp')}" th:src="${post.mediaUrl}" class="w-full max-h-[500px] object-cover cursor-pointer" alt="post media">
                                <video th:if="${#strings.endsWith(#strings.toLowerCase(post.mediaUrl), '.mp4') or #strings.endsWith(#strings.toLowerCase(post.mediaUrl), '.webm') or #strings.endsWith(#strings.toLowerCase(post.mediaUrl), '.ogg')}" th:src="${post.mediaUrl}" class="w-full max-h-[500px]" controls></video>
                            </div>
                        </div>
                    </div>
                </article>
            </section>

            <section th:if="${(users == null || users.isEmpty()) && (posts == null || posts.isEmpty()) && keyword != null}" class="flex flex-col items-center justify-center py-16 px-4 bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm border border-slate-200/50 dark:border-slate-800/50 rounded-2xl border-dashed">
                <span class="w-16 h-16 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center mb-4"><i class="fa-solid fa-magnifying-glass text-2xl text-slate-400"></i></span>
                <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-2 text-center">No results for "<span th:text="${keyword}"></span>"</h2>
                <p class="text-slate-500 dark:text-slate-400 text-center">Try a shorter keyword, username, or a different spelling.</p>
            </section>
        </main>
        
        <div th:replace="~{components/rightbar :: rightbar}"></div>
    </div>

    <div th:replace="~{components/navigation :: mobile_nav}"></div>
    <div th:replace="~{components/modals :: modals}"></div>
</body>
</html>
