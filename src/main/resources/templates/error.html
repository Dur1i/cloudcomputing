<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Something went wrong / TC Social</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/social-modern.css">
    <script src="/js/social-modern.js"></script>
</head>
<body>
    <main class="auth-page">
        <section class="auth-card text-center ui-stack" aria-labelledby="errorTitle">
            <div class="brand-mark mx-auto mb-3"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h1 id="errorTitle" class="h3 fw-bold mb-2">Something went wrong</h1>
            <p class="text-muted mb-4">The page could not be opened right now. Please return home and try again.</p>
            <div class="ui-cluster justify-content-center">
                <button type="button" class="ui-button ui-button-secondary" onclick="history.back()">Go back</button>
                <a href="/" class="ui-button ui-button-primary">Back to home</a>
            </div>
        </section>
    </main>
</body>
</html>
