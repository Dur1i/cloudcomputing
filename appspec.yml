version: 0.0
os: linux

files:
  - source: websocial.jar
    destination: /opt/tc-social
  - source: deploy/tc-social.service
    destination: /etc/systemd/system
  - source: deploy/nginx-tcblog.conf
    destination: /etc/nginx/sites-available
  - source: scripts/run_application.sh
    destination: /opt/tc-social

permissions:
  - object: /opt/tc-social
    owner: ubuntu
    group: ubuntu
    mode: 750
    type:
      - directory
  - object: /opt/tc-social/websocial.jar
    owner: ubuntu
    group: ubuntu
    mode: 640
    type:
      - file
  - object: /opt/tc-social/run_application.sh
    owner: ubuntu
    group: ubuntu
    mode: 750
    type:
      - file

hooks:
  ApplicationStop:
    - location: scripts/stop_application.sh
      timeout: 60
      runas: root
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 120
      runas: root
  ApplicationStart:
    - location: scripts/start_application.sh
      timeout: 120
      runas: root
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 120
      runas: root

